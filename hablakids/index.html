<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HablaKids">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🦉%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🦉%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/rewards.css">
  <link rel="stylesheet" href="css/parent-panel.css">
  <title>HablaKids - Aprende a hablar jugando</title>
  <style>
    body { background: var(--blanco); }
    @media (display-mode: standalone) {
      body { padding-top: env(safe-area-inset-top); }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gris); border-radius: 4px; }
    @media (prefers-color-scheme: dark) {
      body { background: var(--blanco); }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <script src="data/rewards.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/store.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/audio-processor.js"></script>
  <script src="js/levels/level0.js"></script>
  <script src="js/levels/level1.js"></script>
  <script src="js/levels/level2.js"></script>
  <script src="js/levels/level3.js"></script>
  <script src="js/levels/level4.js"></script>
  <script src="js/levels/level5.js"></script>
  <script src="js/levels/expert.js"></script>
  <script src="js/games/fonetica.js"></script>
  <script src="js/games/vocabulario.js"></script>
  <script src="js/games/historia.js"></script>
  <script src="js/games/ritmo.js"></script>
  <script src="js/games/espejo.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
